name: "Deploy Kustomize via SSH"
description: "Update kustomize image tag for a service then kubectl apply -k"

inputs:
  host: { required: true }
  username: { required: true }
  key: { required: true }
  port: { required: false, default: "22" }

  repo_dir:
    required: false
    description: "Remote repo directory that contains k8s/"
    default: "/home/ubuntu/DockerInfra"
    
  overlay_dir:
    required: false
    description: "Overlay dir path relative to repo_dir (e.g. k8s/overlays/aws-test)"
    default: "k8s/overlays/aws-test"

  namespace:
    required: false
    description: "Kubernetes namespace (e.g. apps-aws-test)"
    default: "apps-aws-test"

  image_name:
    required: true
    description: "Full image name used in kustomization (e.g. cr.alkhwarizmi.online/paymentservice)"

  target_image_name:
    required: false
    description: "Optional actual image name to set as kustomize newName (defaults to image_name)"
  
  image_tag:
    required: true
    description: "New tag"
  
  deployment_name:
    required: false
    description: "Deployment name for rollout status (optional)"

  lock_timeout_seconds:
    required: false
    description: "How long to wait for overlay deploy lock"
    default: "300"

runs:
  using: "composite"
  steps:
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        script: |
          set -e
          TARGET_IMAGE="${{ inputs.target_image_name }}"
          if [ -z "$TARGET_IMAGE" ]; then
            TARGET_IMAGE="${{ inputs.image_name }}"
          fi
          LOCK_DIR="/tmp/docker-remote-k8s-deploy-locks"
          mkdir -p "$LOCK_DIR"
          SAFE_OVERLAY="$(echo "${{ inputs.overlay_dir }}" | tr '/:' '__')"
          LOCK_FILE="$LOCK_DIR/${SAFE_OVERLAY}.lock"

          (
            flock -w "${{ inputs.lock_timeout_seconds }}" 9

            cd "${{ inputs.repo_dir }}"
            cd "${{ inputs.overlay_dir }}"
            kustomize edit set image ${{ inputs.image_name }}=$TARGET_IMAGE:${{ inputs.image_tag }}
            cd - >/dev/null

            kubectl apply -k "${{ inputs.overlay_dir }}"
            if [ -n "${{ inputs.deployment_name }}" ]; then
              kubectl -n "${{ inputs.namespace }}" rollout status deploy/${{ inputs.deployment_name }} --timeout=180s
            fi
          ) 9>"$LOCK_FILE"
